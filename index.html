<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUMS CS2</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111214; --card:#161B25; --card2:#1A2133;
  --accent:#FF6B00; --blue:#0099FF; --text:#E8EAF0;
  --muted:#6B7280; --red:#FF5B5B; --border:#252D3D;
  --yellow:#FFD166; --orange:#FF6B00;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:44px 20px 70px;font-size:16px}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
  linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;opacity:0.3;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:860px}

/* NAV */
nav{display:flex;gap:4px;margin-bottom:36px;flex-wrap:wrap}
.nav-btn{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;background:none;border:none;
  cursor:pointer;padding:6px 0;color:var(--muted);border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-btn:not(.active):hover{color:var(--text)}
.nav-divider{font-family:'Rajdhani',sans-serif;font-size:26px;color:var(--border);
  align-self:center;padding:0 5px;user-select:none}
.page{display:none}.page.active{display:block}

/* SECTION LABEL */
.section-label{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}

/* SHARED PLAYER ROWS */
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.player-row{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.player-row:focus-within{border-color:rgba(0,212,170,.5)}
.player-index{font-size:11px;color:var(--muted);min-width:16px;font-variant-numeric:tabular-nums}
.player-row input{background:transparent;border:none;color:var(--text);
  font-family:'Inter',sans-serif;font-size:15px;font-weight:500;outline:none;width:100%}
.player-row input.elo-input{color:var(--accent);width:68px;min-width:68px;
  text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
.player-row input::placeholder{color:var(--muted)}
.sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.player-actions{display:flex;gap:8px;margin-bottom:20px}

/* BUTTONS */
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--muted);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;
  border-radius:8px;cursor:pointer;transition:border-color .15s,color .15s}
.btn-secondary:hover{border-color:var(--text);color:var(--text)}
.btn-primary{width:100%;background:var(--accent);color:#0D0F14;border:none;
  font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:16px;border-radius:8px;cursor:pointer;margin-bottom:28px;
  transition:filter .15s,transform .1s}
.btn-primary:hover{filter:brightness(1.1)}.btn-primary:active{transform:scale(.99)}

/* BALANCE RESULT */
.result{display:block}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.team-header{padding:10px 14px 8px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.team-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase}
.team-total-label{font-size:11px;color:var(--muted)}
.team-total-val{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.team-players{padding:6px 0}
.team-player{display:flex;justify-content:space-between;align-items:center;
  padding:7px 14px;transition:background .1s}
.team-player:hover{background:var(--card2)}
.team-player .pname{font-size:14px}.team-player .pelo{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.diff-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.diff-left{display:flex;flex-direction:column;gap:3px}
.diff-title{font-size:12px;color:var(--muted);font-weight:500}
.diff-sub{font-size:11px;color:var(--muted);opacity:.7}
.diff-val{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;
  color:var(--yellow);font-variant-numeric:tabular-nums;letter-spacing:1px}
.team-t1{box-shadow:inset 0 2px 0 var(--accent)}.team-t2{box-shadow:inset 0 2px 0 var(--blue)}

/* WHEEL SHARED */
.wheel-layout{display:grid;grid-template-columns:1fr 400px;gap:32px;align-items:start}
.wheel-left{display:flex;flex-direction:column;gap:14px}
.wheel-right{display:flex;flex-direction:column;align-items:center;gap:14px}
.wheel-wrap{position:relative;width:380px;height:380px}
.wheel-pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;
  border-top:30px solid var(--accent);z-index:10}
.wheel-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.spin-btn{width:100%;background:var(--accent);color:#0D0F14;border:none;
  font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:15px;border-radius:8px;cursor:pointer;transition:filter .15s,transform .1s}
.spin-btn:hover{filter:brightness(1.1)}.spin-btn:active{transform:scale(.99)}
.spin-btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
.reset-btn{width:100%;background:var(--card);color:var(--muted);border:1px solid var(--border);
  font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;padding:11px;border-radius:8px;cursor:pointer;transition:color .15s,border-color .15s}
.reset-btn:hover{color:var(--text);border-color:var(--text)}
.spins-left{font-size:14px;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}

/* MUMSHJULET — queue */
.queue-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.queue-header{padding:11px 16px;border-bottom:1px solid var(--border);
  font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:1px;color:var(--accent);text-transform:uppercase}
.queue-list{padding:6px 0;min-height:40px}
.queue-item{display:flex;align-items:center;gap:8px;padding:9px 16px}
.queue-num{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--muted);min-width:24px}
.queue-name{font-size:15px;font-weight:500}
.queue-tag{margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.5px;
  padding:2px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.tag-bench{background:rgba(255,91,91,.15);color:var(--red)}
.tag-play{background:rgba(255,107,0,.12);color:var(--accent)}

/* HJULINDELNING — team columns */
.indelning-teams{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
.lag-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.lag-header{padding:8px 12px;border-bottom:1px solid var(--border);
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:0;text-transform:uppercase;
  min-height:44px;display:flex;align-items:center;line-height:1.2}
.lag-list{padding:6px 0;min-height:44px}
.lag-item{display:flex;align-items:center;gap:10px;padding:8px 16px;animation:fadeUp .2s ease both}
.lag-item .wheel-dot{width:11px;height:11px}
.lag-pname{font-size:15px;font-weight:500}

/* ANNOUNCEMENT overlay */
#announcement{display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.82);align-items:center;justify-content:center;flex-direction:column}
.ann-inner{text-align:center;padding:40px 50px;animation:annPop .3s cubic-bezier(.34,1.56,.64,1) both}
.ann-sub{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:600;
  letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.ann-main{font-family:'Rajdhani',sans-serif;font-size:72px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;line-height:1.1;margin-bottom:16px}
.ann-team{font-family:'Rajdhani',sans-serif;font-size:44px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase}

@keyframes annPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* FIREWORKS */
#fwCanvas{display:none;position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:100}

/* FINAL MODAL */
#finalModal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);
  align-items:center;justify-content:center}
.final-inner{background:#161B25;border:1px solid #252D3D;border-radius:16px;padding:32px 36px;
  max-width:420px;width:90%;text-align:center;box-shadow:0 0 60px rgba(255,107,0,.15)}

@media(max-width:700px){
  .wheel-layout{grid-template-columns:1fr}
  .wheel-right{width:100%}.wheel-wrap{margin:0 auto}
  .players-grid{grid-template-columns:1fr}
  .teams-grid,.indelning-teams{grid-template-columns:1fr}
}

/* Logo top-right */
.mums-logo-fixed{position:fixed;top:14px;right:18px;z-index:500;pointer-events:none}
.mums-logo-fixed img{width:190px;display:block}

.faceit-name-row{background:var(--card2);border:1px solid var(--border);border-radius:7px;
  padding:6px 10px;display:flex;align-items:center;gap:8px}
.faceit-name-row input{background:transparent;border:none;color:var(--muted);
  font-family:'Inter',sans-serif;font-size:12px;outline:none;width:100%}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;display:flex;align-items:center;gap:12px}
.rank-num{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;
  color:var(--muted);min-width:28px}
.rank-num.gold{color:#FFD166}.rank-num.silver{color:#C0C0C0}.rank-num.bronze{color:#CD7F32}
.rank-name{font-size:14px;font-weight:500;flex:1}
.rank-elo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;
  color:var(--accent);font-variant-numeric:tabular-nums}
</style>
</head>

<div class="page active" id="pageWheel">
  <div class="section-label">Spelare</div>
  <div class="wheel-layout">
    <div class="wheel-left">
      <div id="wheelNamesGrid"></div>
      <div style="display:flex;gap:7px;margin-top:2px;align-items:center">
        <input id="wNewName" type="text" placeholder="Lägg till namn..."
          style="flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:8px 12px;border-radius:8px;outline:none"
          onkeydown="if(event.key==='Enter')wAddPlayer()"
          onfocus="this.style.borderColor='rgba(0,212,170,.5)'" onblur="this.style.borderColor='var(--border)'">
        <button class="btn-secondary" style="flex-shrink:0;white-space:nowrap" onclick="wAddPlayer()">+ Lägg till</button>
        <button class="btn-secondary" style="flex-shrink:0" onclick="wRemovePlayer()">−</button>
      </div>
      <div class="queue-card">
        <div class="queue-header">Spelordning</div>
        <div class="queue-list" id="queueList">
          <div style="padding:10px 16px;font-size:13px;color:var(--muted)">Ingen har snurrats ännu</div>
        </div>
      </div>
    </div>
    <div class="wheel-right">
      <div class="wheel-wrap">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="380" height="380"></canvas>
      </div>

      <button class="spin-btn" id="spinBtn" onclick="spin()">🎡 Snurra</button>
      <button class="reset-btn" onclick="location.reload()">Återställ</button>
    </div>
  </div>
</div>

<!-- ══ HJULINDELNING ══ -->
<div class="page" id="pageIndelning">

  <!-- Editable player list -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;margin-top:-10px">
    <div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:10px">SPELARE</div>
    <div id="indelNameGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:7px"></div>
  </div>

  <div class="wheel-layout">
    <div class="wheel-left">
      <div class="indelning-teams">

          <div class="lag-list" id="lag1List">
            <div style="padding:10px 16px;font-size:13px;color:var(--muted)">Ingen ännu</div>
          </div>
        </div>
        <div class="lag-card" style="box-shadow:inset 0 2px 0 var(--blue)">
          <div class="lag-header" id="lag2Header" style="color:var(--blue)">LAG 2</div>

            <div style="padding:10px 16px;font-size:13px;color:var(--muted)">Ingen ännu</div>
          </div>
        </div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;
        padding:11px 16px;font-size:13px;color:var(--muted);text-align:center" id="indelNästa">

</div>

<script>
/* ══════════════════ NAV ══════════════════ */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const key=id.charAt(0).toUpperCase()+id.slice(1);
  document.getElementById('page'+key).classList.add('active');

  const tot=pl.reduce((s,p)=>s+p.elo,0);
  let bd=Infinity,bi=null;
  for(const c of combos(pl.map((_,i)=>i),half)){
    const s=c.reduce((x,i)=>x+pl[i].elo,0),d=Math.abs(s-(tot-s));
    if(d<bd){bd=d;bi=new Set(c);}
  }
  const t1=pl.filter((_,i)=>bi.has(i)).sort((a,b)=>b.elo-a.elo);
  const t2=pl.filter((_,i)=>!bi.has(i)).sort((a,b)=>b.elo-a.elo);

function drawWheelOnCanvas(canvasId, players, currentAngle){
  const cv=document.getElementById(canvasId);
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const cx=cv.width/2,cy=cv.height/2,r=cx-4;
  const n=players.length;
  if(n===0){ctx.clearRect(0,0,cv.width,cv.height);return;}
  const arc=(2*Math.PI)/n;
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let i=0;i<n;i++){
    const sa=currentAngle+i*arc-Math.PI/2,ea=sa+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
    ctx.fillStyle=players[i].color;ctx.fill();
    ctx.strokeStyle='#0D0F14';ctx.lineWidth=2;ctx.stroke();
    const mid=sa+arc/2,tx=cx+(r*.63)*Math.cos(mid),ty=cy+(r*.63)*Math.sin(mid);
    ctx.save();ctx.translate(tx,ty);ctx.rotate(mid+Math.PI/2);
    ctx.font="bold 15px 'Inter',sans-serif";ctx.fillStyle='#0D0F14';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText((players[i].name||'?').substring(0,9),0,0);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,20,0,2*Math.PI);
  ctx.fillStyle='#0D0F14';ctx.fill();ctx.strokeStyle='#252D3D';ctx.lineWidth=2;ctx.stroke();
  ctx.font="bold 16px 'Rajdhani',sans-serif";ctx.fillStyle='#FF6B00';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,cx,cy);
}

function spinWheel(players, onWin, onFrame){
  const n=players.length,arc=(2*Math.PI)/n;
  const winnerPos=Math.floor(Math.random()*n);
  const jitter=(Math.random()-.5)*arc*.5;
  const extraSpins=(8+Math.floor(Math.random()*4))*2*Math.PI;
  const targetDelta=extraSpins-(winnerPos*arc+arc/2)+jitter;
  function ease(t){return 1-Math.pow(1-t,6);}
  const dur=12000,t0=performance.now();
  let a0=0,lastAngle=0;
  function finish(angle){
    onWin(winnerPos, angle+targetDelta);
  }
  (function frame(now){
    const t=Math.min((now-t0)/dur,1);
    const angle=a0+targetDelta*ease(t);
    const velocity=Math.abs(angle-lastAngle);lastAngle=angle;
    onFrame(angle);
    if(t>.75&&velocity<.00008){finish(a0);return;}
    if(t<1)requestAnimationFrame(frame);else finish(a0);
  })(t0);
  return winnerPos;
}

/* ══════════════════ FIREWORKS ══════════════════ */
function launchFireworks(){
  const cv=document.getElementById('fwCanvas');cv.style.display='block';
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');const particles=[];
  const FCOLS=['#FF6B00','#FFD166','#FF5B5B','#0099FF','#FF8C42','#C084FC','#4ADE80','#fff'];
  function burst(x,y){
    for(let i=0;i<100;i++){
      const a=Math.random()*2*Math.PI,sp=2+Math.random()*8;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,alpha:1,
        radius:2+Math.random()*3,color:FCOLS[Math.floor(Math.random()*FCOLS.length)],
        decay:.011+Math.random()*.011,gravity:.12});
    }
  }
  [0,200,450,750,1100,1500,1950,2500].forEach(t=>{
    setTimeout(()=>{burst(window.innerWidth*(.2+Math.random()*.6),window.innerHeight*(.1+Math.random()*.5));},t);
  });
  let start=null;
  (function loop(ts){
    if(!start)start=ts;ctx.clearRect(0,0,cv.width,cv.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.98;p.alpha-=p.decay;
      if(p.alpha<=0){particles.splice(i,1);continue;}
      ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,2*Math.PI);
      ctx.fillStyle=p.color;ctx.fill();
    }
    ctx.globalAlpha=1;
    if(ts-start<4000)requestAnimationFrame(loop);else cv.style.display='none';
  })(performance.now());
}

function showWheelAnnouncement(playerName, playerColor, num){
  document.getElementById('annMain').textContent = `${num} = ${playerName}`;
  document.getElementById('annMain').style.color = playerColor || 'var(--text)';
  document.getElementById('annSub').textContent = '';
  document.getElementById('annTeam').textContent = '';
  const el = document.getElementById('announcement');
  el.style.display = 'flex';
  const inner = el.querySelector('.ann-inner');
  inner.style.animation = 'none';
  void inner.offsetWidth;
  inner.style.animation = 'annPop .3s cubic-bezier(.34,1.56,.64,1) both';

/* ══════════════════ FACEIT ══════════════════ */
window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('faceitKey');
  const hid=document.getElementById('faceitApiKey');
  const vis=document.getElementById('faceitApiKeyVisible');
  if(saved){if(hid)hid.value=saved;if(vis)vis.value=saved;}
  if(vis) vis.addEventListener('input',()=>{localStorage.setItem('faceitKey',vis.value);if(hid)hid.value=vis.value;});
});

function renderFaceitNames(){
  const g=document.getElementById('faceitNames');
  if(!g) return;
  g.innerHTML='';
  BAL_PLAYERS.forEach((p,i)=>{
    const d=document.createElement('div');d.className='faceit-name-row';
    d.innerHTML=`<span style="font-size:12px;font-weight:500;color:var(--text);min-width:56px">${p.name}</span>
      <input type="text" value="${p.faceit||p.name}" placeholder="Faceit-namn"
        oninput="BAL_PLAYERS[${i}].faceit=this.value">`;
    g.appendChild(d);
  });
}

function renderRanking(){
  const g=document.getElementById('rankingGrid');
  if(!g) return;
  const sorted=[...BAL_PLAYERS].sort((a,b)=>b.elo-a.elo);
  const top=sorted.slice(0,5);
  const rest=sorted.slice(5);
  function card(p, rank){
    const medal=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    return `<div class="rank-card">
      <span class="rank-num ${medal}">#${rank}</span>
      <span class="rank-name">${p.name}</span>
      <span class="rank-elo">${p.elo.toLocaleString('sv-SE')}</span>
    </div>`;
  }
  g.innerHTML=
    `<div style="display:flex;flex-direction:column;gap:7px">${top.map((p,i)=>card(p,i+1)).join('')}</div>`+
    `<div style="display:flex;flex-direction:column;gap:7px">${rest.map((p,i)=>card(p,i+6)).join('')}</div>`;
}

async function fetchAllElo(){
  const key=document.getElementById('faceitApiKey').value.trim();
  if(!key){setStatus('Ange API-nyckel först','var(--red)');return;}
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;btn.innerHTML='Hämtar...';
  let ok=0,fail=[];
  for(let i=0;i<BAL_PLAYERS.length;i++){
    const p=BAL_PLAYERS[i];
    const nick=(p.faceit||p.name).trim();
    setStatus(`Hämtar ${nick}...`,'var(--muted)');
    try{
      const apiUrl=`https://open.faceit.com/data/v4/players?nickname=${encodeURIComponent(nick)}`;
      const proxyUrl=`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
      const res=await fetch(proxyUrl,{headers:{'Authorization':`Bearer ${key}`,'x-requested-with':'XMLHttpRequest'}});
      if(!res.ok){
        const errText=await res.text().catch(()=>'');
        fail.push(`${nick}(${res.status})`);
        console.error(`${nick}: ${res.status}`,errText);
        continue;
      }
      const data=await res.json();
      const cs2=data?.games?.cs2?.faceit_elo||data?.games?.csgo?.faceit_elo;
      if(cs2){BAL_PLAYERS[i].elo=cs2;ok++;}
      else{fail.push(nick+' (inget CS2)');console.log(`${nick} data:`,data?.games);}
    }catch(e){
      fail.push(`${nick}(CORS?)`);
      console.error(`${nick} fetch error:`,e);
    }
  }
  renderPlayers();
  renderRanking();
  btn.disabled=false;btn.innerHTML='⚡ Uppdatera allas ELO och balansera lagen';
  if(ok>0) balance();
  if(fail.length===0) setStatus(`✅ Uppdaterade ${ok} spelare!`,'var(--accent)');
  else setStatus(`✅ ${ok} ok  ⚠️ Misslyckades: ${fail.join(', ')}`, 'var(--yellow)');
}

function setStatus(msg,color){
  const el=document.getElementById('fetchStatus');
  if(el){el.textContent=msg;el.style.color=color;}
}

async function fetchAndBalance(){
  const key='001e172e-7255-4545-b25d-47af65ffa171';
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;
  if(key){
    btn.innerHTML='Hämtar ELO...';
    let ok=0,fail=[];
    for(let i=0;i<BAL_PLAYERS.length;i++){
      const p=BAL_PLAYERS[i];
      const nick=(p.faceit||p.name).trim();
      setStatus(`Hämtar ${nick}...`,'var(--muted)');
      try{
        const apiUrl=`https://open.faceit.com/data/v4/players?nickname=${encodeURIComponent(nick)}`;
        const proxyUrl=`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
        const res=await fetch(proxyUrl,{headers:{'Authorization':`Bearer ${key}`,'x-requested-with':'XMLHttpRequest'}});
        if(!res.ok){fail.push(nick);continue;}
        const data=await res.json();
        const cs2=data?.games?.cs2?.faceit_elo||data?.games?.csgo?.faceit_elo;
        if(cs2){BAL_PLAYERS[i].elo=cs2;ok++;}
        else fail.push(nick+' (inget CS2)');
      }catch(e){fail.push(nick);}
    }
    if(fail.length===0) setStatus(`✅ ${ok} spelare uppdaterade`,'var(--accent)');
    else setStatus(`✅ ${ok} ok  ⚠️ ${fail.join(', ')}`, 'var(--yellow)');
  } else {
    setStatus('Ingen API-nyckel sparad — balanserar med befintliga ELO','var(--muted)');
  }
  // Sort by ELO descending
  BAL_PLAYERS.sort((a,b)=>b.elo-a.elo);
  // Save to localStorage
  localStorage.setItem('bal_players', JSON.stringify(BAL_PLAYERS.map(p=>({name:p.name,elo:p.elo,faceit:p.faceit}))));
  renderPlayers();
  btn.disabled=false;
  btn.innerHTML='⚡ Uppdatera allas ELO och balansera lagen';
  balance();
}

})();
